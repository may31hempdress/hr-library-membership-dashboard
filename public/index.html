<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>人事図書館 メンバー推移ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #e5e5e5;
    --border-strong: #d4d4d4;
    --text: #1a1a1a;
    --text-2: #2d2d2d;
    --muted: #666666;
    --muted-2: #888888;

    --brand: #534C49;
    --brand-soft: #7a6f6a;
    --accent: #e06838;

    --full:   #3b82f6;
    --online: #e06838;
    --corp:   #f59e0b;
    --total-line: #7c2d12;

    --good: #16a34a;
    --good-bg: #dcfce7;
    --bad: #dc2626;
    --bad-bg: #fef2f2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-2);
    font-family: "Noto Sans JP", "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 24px 32px 16px;
    border-bottom: 2px solid var(--brand);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    background: var(--bg);
  }
  h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text); letter-spacing: .5px; }
  .meta { font-size: 12px; color: var(--muted-2); margin-top: 4px; }

  .toggle {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .toggle button {
    all: unset;
    padding: 8px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 7px;
    color: var(--muted);
    transition: background .15s, color .15s;
  }
  .toggle button.active { background: var(--brand); color: #fff; }

  main { padding: 24px 32px 48px; max-width: 1600px; margin: 0 auto; }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .kpi .label { font-size: 11px; color: var(--muted); letter-spacing: .04em; font-weight: 600; }
  .kpi .value { font-size: 28px; font-weight: 700; margin-top: 4px; color: var(--text); }
  .kpi .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kpi .delta-up { color: var(--good); font-weight: 600; }
  .kpi .delta-down { color: var(--bad); font-weight: 600; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    min-width: 0;
    overflow: hidden;
  }
  .card h2 {
    font-size: 14px;
    margin: 0 0 12px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .card h2 .hint { font-size: 11px; color: var(--muted); font-weight: 400; }

  .card-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-legend .item { display: inline-flex; align-items: center; gap: 5px; }
  .card-legend .swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }

  .chart-wrap {
    position: relative;
    height: 320px;
    display: flex;
    align-items: stretch;
  }
  .chart-yaxis {
    width: 58px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    background: var(--card);
  }
  .chart-yaxis canvas { display: block; width: 100% !important; height: 100% !important; }
  .chart-scroll {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    min-width: 0;
  }
  .chart-scroll::-webkit-scrollbar { height: 10px; }
  .chart-scroll::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 5px; }
  .chart-scroll::-webkit-scrollbar-thumb { background: var(--brand-soft); border-radius: 5px; }
  .chart-scroll::-webkit-scrollbar-thumb:hover { background: var(--brand); }
  .chart-inner {
    position: relative;
    height: 100%;
    min-width: 100%;
  }
  .chart-inner canvas { display: block; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; overflow-x: auto; max-height: 420px; overflow-y: auto; margin-top: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .table-wrap h2 { font-size: 14px; margin: 0 0 8px; font-weight: 700; color: var(--text); }
  .legend {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 11px;
  }
  .legend .chip.good { background: var(--good-bg); color: var(--good); }
  .legend .chip.bad { background: var(--bad-bg); color: var(--bad); }
  .legend .note { color: var(--muted-2); }

  table.table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.table th, table.table td {
    border-bottom: 1px solid var(--border);
    padding: 7px 10px;
    text-align: right;
    white-space: nowrap;
  }
  table.table th:first-child, table.table td:first-child { text-align: left; color: var(--muted); font-weight: 500; }
  table.table thead th { position: sticky; top: 0; background: var(--card); color: var(--muted); font-weight: 600; border-bottom: 2px solid var(--border-strong); }
  .pct-bad { color: var(--bad); font-weight: 600; }
  .pct-ok { color: var(--good); font-weight: 600; }
  .pct-neutral { color: var(--text-2); }
  .legend .chip.neutral { background: #f0f0f0; color: var(--text-2); }
</style>
</head>
<body>

<header>
  <div>
    <h1>人事図書館 メンバー推移ダッシュボード</h1>
    <div class="meta" id="meta">—</div>
  </div>
  <div class="toggle" role="tablist">
    <button id="btn-weekly" class="active" type="button">週次</button>
    <button id="btn-monthly" type="button">月次</button>
  </div>
</header>

<main>
  <section class="kpis" id="kpis"></section>

  <section class="charts">
    <div class="card">
      <h2>アクティブメンバー数推移 <span class="hint">フル + オンライン + 法人一括</span></h2>
      <div class="card-legend" id="legend-active"></div>
      <div class="chart-wrap">
        <div class="chart-yaxis"><canvas id="chart-active-y"></canvas></div>
        <div class="chart-scroll"><div class="chart-inner"><canvas id="chart-active"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <h2>退会率 (%) <span class="hint">当期退会 ÷ 期首アクティブ</span></h2>
      <div class="card-legend" id="legend-churn"></div>
      <div class="chart-wrap">
        <div class="chart-yaxis"><canvas id="chart-churn-y"></canvas></div>
        <div class="chart-scroll"><div class="chart-inner"><canvas id="chart-churn"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <h2>入会者数 <span class="hint">種別内訳</span></h2>
      <div class="card-legend" id="legend-new"></div>
      <div class="chart-wrap">
        <div class="chart-yaxis"><canvas id="chart-new-y"></canvas></div>
        <div class="chart-scroll"><div class="chart-inner"><canvas id="chart-new"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <h2>退会者数 <span class="hint">種別内訳</span></h2>
      <div class="card-legend" id="legend-leave"></div>
      <div class="chart-wrap">
        <div class="chart-yaxis"><canvas id="chart-leave-y"></canvas></div>
        <div class="chart-scroll"><div class="chart-inner"><canvas id="chart-leave"></canvas></div></div>
      </div>
    </div>
  </section>

  <section class="table-wrap">
    <h2>明細(直近10期)</h2>
    <div class="legend" id="table-legend"></div>
    <table class="table" id="detail-table"></table>
  </section>
</main>

<script>
const COLORS = {
  full:   '#3b82f6',
  online: '#e06838',
  corp:   '#f59e0b',
  total:  '#7c2d12',
};
const LABELS = { full: 'フル', online: 'オンライン', corp: '法人一括', total: '合計' };

// 退会率の色分け閾値
// 月次: ≥4% 赤 / <3% 緑 / それ以外 黒
// 週次: 月次閾値を週次相当に換算 (月を 30.44日 = 4.35週として複利換算)
//   bad  = 1 - (1 - 0.04)^(1/4.35) ≈ 0.94%
//   good = 1 - (1 - 0.03)^(1/4.35) ≈ 0.70%
function monthlyToWeeklyRate(monthlyPct) {
  const m = monthlyPct / 100;
  return (1 - Math.pow(1 - m, 1 / 4.35)) * 100;
}
const CHURN_THRESHOLDS = {
  monthly: { bad: 4.0, good: 3.0 },
  weekly:  { bad: monthlyToWeeklyRate(4.0), good: monthlyToWeeklyRate(3.0) },
};

let DATA = null;
let currentPeriodicity = 'weekly';
const charts = {}; // { key: { y: Chart, plot: Chart } }

// 一度に表示したい期間数
const TARGET_VISIBLE = { weekly: 26, monthly: 12 };

function fmtDate(iso, periodicity) {
  if (!iso) return '';
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  if (periodicity === 'monthly') return `${y}/${m}`;
  return `${y}/${m}/${day}`;
}

function churnRateSeries(leave, activePrev) {
  const out = [];
  for (let i = 0; i < leave.length; i++) {
    if (i === 0 || leave[i] == null || activePrev[i - 1] == null || activePrev[i - 1] === 0) {
      out.push(null);
    } else {
      out.push((leave[i] / activePrev[i - 1]) * 100);
    }
  }
  return out;
}

function sumArr(...arrs) {
  const n = arrs[0].length;
  const out = [];
  for (let i = 0; i < n; i++) {
    let s = 0;
    let anyNonNull = false;
    for (const a of arrs) {
      if (a[i] != null) { s += a[i]; anyNonNull = true; }
    }
    out.push(anyNonNull ? s : null);
  }
  return out;
}

function niceMax(v) {
  // Round up to a "nice" number for y-axis
  if (v <= 0) return 10;
  const pow = Math.pow(10, Math.floor(Math.log10(v)));
  const base = v / pow;
  let factor;
  if (base <= 1) factor = 1;
  else if (base <= 1.5) factor = 1.5;
  else if (base <= 2) factor = 2;
  else if (base <= 2.5) factor = 2.5;
  else if (base <= 3) factor = 3;
  else if (base <= 4) factor = 4;
  else if (base <= 5) factor = 5;
  else if (base <= 7.5) factor = 7.5;
  else factor = 10;
  return factor * pow;
}

function destroyCharts() {
  for (const k of Object.keys(charts)) {
    const pair = charts[k];
    if (pair) {
      if (pair.y) pair.y.destroy();
      if (pair.plot) pair.plot.destroy();
    }
    delete charts[k];
  }
}

function renderCardLegend(containerId, items) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = items.map(it => `
    <span class="item">
      <span class="swatch" style="background:${it.color}"></span>${it.label}
    </span>
  `).join('');
}

// Y軸固定+横スクロール版 チャート描画
function renderStickyChart(key, { chartType, datasets, labels, yMax, yTickCallback, tooltipCallback, stacked = false }) {
  const yCanvas = document.getElementById(`chart-${key}-y`);
  const pCanvas = document.getElementById(`chart-${key}`);
  if (!yCanvas || !pCanvas) return;

  // スクロールエリアの幅から、1期あたりの px を算出
  const scrollEl = pCanvas.closest('.chart-scroll');
  const innerEl = pCanvas.closest('.chart-inner');
  const visibleW = scrollEl ? scrollEl.clientWidth : 500;
  const targetVisible = TARGET_VISIBLE[currentPeriodicity];
  const pxPerPoint = Math.max(16, visibleW / targetVisible);
  const totalW = Math.max(visibleW, pxPerPoint * labels.length);
  if (innerEl) innerEl.style.width = totalW + 'px';

  // 共通の x-axis 設定 (両チャートで同じレイアウトに)
  const xBase = {
    ticks: { color: '#666', font: { size: 10 }, maxRotation: 0, autoSkip: true, autoSkipPadding: 8 },
    grid: { color: 'rgba(0,0,0,.04)' },
    stacked,
  };

  // Y軸のみチャート (データを透明化、スケールだけ表示)
  const yOnlyDatasets = datasets.map(ds => ({
    ...ds,
    data: [null],
    backgroundColor: 'transparent',
    borderColor: 'transparent',
    pointRadius: 0,
  }));
  charts[key] = charts[key] || {};
  charts[key].y = new Chart(yCanvas, {
    type: chartType,
    data: { labels: [''], datasets: yOnlyDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      events: [],
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        y: {
          beginAtZero: true,
          max: yMax,
          stacked,
          ticks: {
            color: '#666',
            font: { size: 11 },
            callback: yTickCallback,
          },
          grid: { display: false },
          border: { color: '#d4d4d4' },
        },
        x: {
          ...xBase,
          ticks: { ...xBase.ticks, callback: () => '' },
          grid: { display: false },
          border: { display: false },
        },
      },
    },
  });

  // プロット側チャート (Y軸非表示、データとX軸のみ)
  charts[key].plot = new Chart(pCanvas, {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,26,26,0.92)',
          titleFont: { size: 12 },
          bodyFont: { size: 11 },
          padding: 10,
          callbacks: tooltipCallback ? { label: tooltipCallback } : undefined,
        },
      },
      scales: {
        y: {
          display: false,
          beginAtZero: true,
          max: yMax,
          stacked,
        },
        x: xBase,
      },
    },
  });
}

function renderKPIs(d, periodicity) {
  const n = d.dates.length;
  const i = n - 1;
  const iPrev = n - 2;

  const newTotal = (d.new_full[i] ?? 0) + (d.new_online[i] ?? 0) + (d.new_corp[i] ?? 0);
  const leaveTotal = (d.leave_full[i] ?? 0) + (d.leave_online[i] ?? 0) + (d.leave_corp[i] ?? 0);
  const activeTotal = (d.active_full[i] ?? 0) + (d.active_online[i] ?? 0) + (d.active_corp[i] ?? 0);
  const activePrev = (d.active_full[iPrev] ?? 0) + (d.active_online[iPrev] ?? 0) + (d.active_corp[iPrev] ?? 0);
  const churn = activePrev > 0 ? (leaveTotal / activePrev) * 100 : null;
  const activeDelta = activeTotal - activePrev;
  const periodLabel = periodicity === 'weekly' ? '当週' : '当月';
  const prevLabel = periodicity === 'weekly' ? '週' : '月';
  const endLabel = fmtDate(d.dates[i], periodicity);

  const items = [
    { label: `${endLabel} アクティブ合計`, value: activeTotal.toLocaleString(), sub: `前${prevLabel}比 ${activeDelta >= 0 ? '+' : ''}${activeDelta}`, deltaClass: activeDelta >= 0 ? 'delta-up' : 'delta-down' },
    { label: `${periodLabel} 入会数`, value: newTotal.toLocaleString(), sub: `フル ${d.new_full[i] ?? 0} / オンライン ${d.new_online[i] ?? 0} / 法人 ${d.new_corp[i] ?? 0}` },
    { label: `${periodLabel} 退会数`, value: leaveTotal.toLocaleString(), sub: `フル ${d.leave_full[i] ?? 0} / オンライン ${d.leave_online[i] ?? 0} / 法人 ${d.leave_corp[i] ?? 0}` },
    { label: `${periodLabel} 退会率`, value: churn == null ? '—' : churn.toFixed(1) + '%', sub: `期首アクティブ ${activePrev.toLocaleString()}` },
  ];

  document.getElementById('kpis').innerHTML = items.map(it => `
    <div class="kpi">
      <div class="label">${it.label}</div>
      <div class="value">${it.value}</div>
      <div class="sub ${it.deltaClass || ''}">${it.sub}</div>
    </div>
  `).join('');
}

// Y軸最大値を全期間横断で決める
function computeAxisMaxes() {
  const w = DATA.weekly;
  const m = DATA.monthly;

  // アクティブ合計の最大値(週次と月次で統一)
  const weeklyActiveMax = Math.max(...sumArr(w.active_full, w.active_online, w.active_corp).filter(v => v != null));
  const monthlyActiveMax = Math.max(...sumArr(m.active_full, m.active_online, m.active_corp).filter(v => v != null));
  const activeMax = niceMax(Math.max(weeklyActiveMax, monthlyActiveMax));

  // 入会/退会の最大値(同一期間内で統一)
  function flowMax(ds) {
    const newT = sumArr(ds.new_full, ds.new_online, ds.new_corp).filter(v => v != null);
    const leaveT = sumArr(ds.leave_full, ds.leave_online, ds.leave_corp).filter(v => v != null);
    const peak = Math.max(...newT, ...leaveT);
    return niceMax(peak);
  }

  // 退会率の最大値(期間別、4系列の最大)
  function churnMax(ds) {
    const activeTotal = sumArr(ds.active_full, ds.active_online, ds.active_corp);
    const leaveTotal = sumArr(ds.leave_full, ds.leave_online, ds.leave_corp);
    const all = [
      ...churnRateSeries(leaveTotal, activeTotal),
      ...churnRateSeries(ds.leave_full, ds.active_full),
      ...churnRateSeries(ds.leave_online, ds.active_online),
      ...churnRateSeries(ds.leave_corp, ds.active_corp),
    ].filter(v => v != null);
    return niceMax(Math.max(...all));
  }

  return {
    active: activeMax,
    flowWeekly: flowMax(w),
    flowMonthly: flowMax(m),
    churnWeekly: churnMax(w),
    churnMonthly: churnMax(m),
  };
}

const STACKED_LEGEND = [
  { label: LABELS.full,   color: COLORS.full },
  { label: LABELS.online, color: COLORS.online },
  { label: LABELS.corp,   color: COLORS.corp },
];
const CHURN_LEGEND = [
  { label: LABELS.total,  color: COLORS.total },
  { label: LABELS.full,   color: COLORS.full },
  { label: LABELS.online, color: COLORS.online },
  { label: LABELS.corp,   color: COLORS.corp },
];

function drawActive(d, labels, axisMaxes) {
  renderCardLegend('legend-active', STACKED_LEGEND);
  renderStickyChart('active', {
    chartType: 'bar',
    labels,
    stacked: true,
    yMax: axisMaxes.active,
    datasets: [
      { label: LABELS.full,   data: d.active_full,   backgroundColor: COLORS.full,   stack: 'a', borderWidth: 0 },
      { label: LABELS.online, data: d.active_online, backgroundColor: COLORS.online, stack: 'a', borderWidth: 0 },
      { label: LABELS.corp,   data: d.active_corp,   backgroundColor: COLORS.corp,   stack: 'a', borderWidth: 0 },
    ],
  });
}

function drawChurn(d, labels, yMax) {
  renderCardLegend('legend-churn', CHURN_LEGEND);
  const activeTotal = sumArr(d.active_full, d.active_online, d.active_corp);
  const churnFull   = churnRateSeries(d.leave_full,   d.active_full);
  const churnOnline = churnRateSeries(d.leave_online, d.active_online);
  const churnCorp   = churnRateSeries(d.leave_corp,   d.active_corp);
  const leaveTotal  = sumArr(d.leave_full, d.leave_online, d.leave_corp);
  const churnTotal  = churnRateSeries(leaveTotal, activeTotal);

  renderStickyChart('churn', {
    chartType: 'line',
    labels,
    yMax,
    yTickCallback: v => v.toFixed(1) + '%',
    tooltipCallback: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y == null ? '—' : ctx.parsed.y.toFixed(1) + '%'}`,
    datasets: [
      { label: LABELS.total,  data: churnTotal,  borderColor: COLORS.total,  backgroundColor: 'rgba(124,45,18,.1)',  borderWidth: 2.5, tension: .25, pointRadius: 3, fill: false },
      { label: LABELS.full,   data: churnFull,   borderColor: COLORS.full,   backgroundColor: COLORS.full,   borderWidth: 1.5, tension: .25, pointRadius: 2, fill: false },
      { label: LABELS.online, data: churnOnline, borderColor: COLORS.online, backgroundColor: COLORS.online, borderWidth: 1.5, tension: .25, pointRadius: 2, fill: false },
      { label: LABELS.corp,   data: churnCorp,   borderColor: COLORS.corp,   backgroundColor: COLORS.corp,   borderWidth: 1.5, tension: .25, pointRadius: 2, fill: false },
    ],
  });
}

function drawNew(d, labels, yMax) {
  renderCardLegend('legend-new', STACKED_LEGEND);
  renderStickyChart('new', {
    chartType: 'bar',
    labels,
    stacked: true,
    yMax,
    datasets: [
      { label: LABELS.full,   data: d.new_full,   backgroundColor: COLORS.full,   stack: 'a', borderWidth: 0 },
      { label: LABELS.online, data: d.new_online, backgroundColor: COLORS.online, stack: 'a', borderWidth: 0 },
      { label: LABELS.corp,   data: d.new_corp,   backgroundColor: COLORS.corp,   stack: 'a', borderWidth: 0 },
    ],
  });
}

function drawLeave(d, labels, yMax) {
  renderCardLegend('legend-leave', STACKED_LEGEND);
  renderStickyChart('leave', {
    chartType: 'bar',
    labels,
    stacked: true,
    yMax,
    datasets: [
      { label: LABELS.full,   data: d.leave_full,   backgroundColor: COLORS.full,   stack: 'a', borderWidth: 0 },
      { label: LABELS.online, data: d.leave_online, backgroundColor: COLORS.online, stack: 'a', borderWidth: 0 },
      { label: LABELS.corp,   data: d.leave_corp,   backgroundColor: COLORS.corp,   stack: 'a', borderWidth: 0 },
    ],
  });
}

function renderDetailTable(d, periodicity) {
  const n = d.dates.length;
  const start = Math.max(0, n - 10);
  const th = CHURN_THRESHOLDS[periodicity];

  const head = `
    <thead>
      <tr>
        <th>${periodicity === 'weekly' ? '週' : '月'}</th>
        <th>入会合計</th><th>フル</th><th>オンライン</th><th>法人</th>
        <th>退会合計</th><th>フル</th><th>オンライン</th><th>法人</th>
        <th>退会率 合計</th><th>フル</th><th>オンライン</th><th>法人</th>
        <th>アクティブ</th>
      </tr>
    </thead>`;

  const activeTotal = sumArr(d.active_full, d.active_online, d.active_corp);
  const cFull   = churnRateSeries(d.leave_full,   d.active_full);
  const cOnline = churnRateSeries(d.leave_online, d.active_online);
  const cCorp   = churnRateSeries(d.leave_corp,   d.active_corp);
  const leaveTotal = sumArr(d.leave_full, d.leave_online, d.leave_corp);
  const cTotal = churnRateSeries(leaveTotal, activeTotal);

  const classifyPct = v => {
    if (v == null) return null;
    if (v >= th.bad) return 'pct-bad';
    if (v < th.good) return 'pct-ok';
    return 'pct-neutral';
  };
  const fmtPct = v => v == null ? '—' : `<span class="${classifyPct(v)}">${v.toFixed(1)}%</span>`;
  const fmtNum = v => v == null ? '—' : v.toLocaleString();

  const rows = [];
  for (let i = n - 1; i >= start; i--) {
    const nT = sumArr(d.new_full, d.new_online, d.new_corp)[i];
    rows.push(`<tr>
      <td>${fmtDate(d.dates[i], periodicity)}</td>
      <td>${fmtNum(nT)}</td><td>${fmtNum(d.new_full[i])}</td><td>${fmtNum(d.new_online[i])}</td><td>${fmtNum(d.new_corp[i])}</td>
      <td>${fmtNum(leaveTotal[i])}</td><td>${fmtNum(d.leave_full[i])}</td><td>${fmtNum(d.leave_online[i])}</td><td>${fmtNum(d.leave_corp[i])}</td>
      <td>${fmtPct(cTotal[i])}</td><td>${fmtPct(cFull[i])}</td><td>${fmtPct(cOnline[i])}</td><td>${fmtPct(cCorp[i])}</td>
      <td>${fmtNum(activeTotal[i])}</td>
    </tr>`);
  }
  document.getElementById('detail-table').innerHTML = head + '<tbody>' + rows.join('') + '</tbody>';

  // テーブル上部の色凡例
  const periodNote = periodicity === 'weekly'
    ? '(週次 — 月次基準を複利換算)'
    : '(月次基準)';
  document.getElementById('table-legend').innerHTML = `
    <span class="note">退会率の色:</span>
    <span class="chip good">緑 &lt; ${th.good.toFixed(1)}%</span>
    <span class="chip neutral">黒 ${th.good.toFixed(1)}–${th.bad.toFixed(1)}%</span>
    <span class="chip bad">赤 ≥ ${th.bad.toFixed(1)}%</span>
    <span class="note">${periodNote}</span>
  `;
}

function scrollChartsToEnd() {
  // 最新データ(右端)を初期表示
  document.querySelectorAll('.chart-scroll').forEach(el => {
    el.scrollLeft = el.scrollWidth;
  });
}

function scheduleScrollToEnd() {
  // Chart.js の ResizeObserver / レイアウト確定が遅れるので複数タイミングで試行
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      scrollChartsToEnd();
      setTimeout(scrollChartsToEnd, 50);
      setTimeout(scrollChartsToEnd, 200);
    });
  });
}

function render() {
  const d = DATA[currentPeriodicity];
  const labels = d.dates.map(x => fmtDate(x, currentPeriodicity));
  const axisMaxes = computeAxisMaxes();
  const flowMax = currentPeriodicity === 'weekly' ? axisMaxes.flowWeekly : axisMaxes.flowMonthly;
  const churnMax = currentPeriodicity === 'weekly' ? axisMaxes.churnWeekly : axisMaxes.churnMonthly;

  destroyCharts();
  renderKPIs(d, currentPeriodicity);
  drawActive(d, labels, axisMaxes);
  drawChurn(d, labels, churnMax);
  drawNew(d, labels, flowMax);
  drawLeave(d, labels, flowMax);
  renderDetailTable(d, currentPeriodicity);
  scheduleScrollToEnd();
}

async function main() {
  const resp = await fetch('./data.json?_=' + Date.now());
  DATA = await resp.json();
  document.getElementById('meta').textContent =
    `データ生成: ${DATA.generated_at.replace('T', ' ')} / ソース: ${DATA.source}`;

  document.getElementById('btn-weekly').addEventListener('click', () => {
    currentPeriodicity = 'weekly';
    document.getElementById('btn-weekly').classList.add('active');
    document.getElementById('btn-monthly').classList.remove('active');
    render();
  });
  document.getElementById('btn-monthly').addEventListener('click', () => {
    currentPeriodicity = 'monthly';
    document.getElementById('btn-monthly').classList.add('active');
    document.getElementById('btn-weekly').classList.remove('active');
    render();
  });

  render();
}

main();
</script>

</body>
</html>
